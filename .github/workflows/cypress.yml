name: Cypress e2e Tests
on: 
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      spec:
        description: "Cypress specs to run"
        required: false
        default: cypress/e2e/*
jobs:
  chrome-tests:
    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:24.17.0
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run e2e tests
        uses: cypress-io/github-action@v7
        with:
          install-command: npm install
          wait-on: 'http://petlov.vercel.app'
          browser: chrome
          group: Chrome
          record: true
          parallel: true
          spec: ${{ github.event.input.spec }}
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  firefox-tests:
    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:24.17.0
      options: --user 1001
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run e2e tests
        uses: cypress-io/github-action@v7
        with:
          install-command: npm install
          wait-on: 'http://petlov.vercel.app'
          browser: firefox
          group: Firefox
          record: true
          parallel: true
          spec: ${{ github.event.input.spec }}
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}